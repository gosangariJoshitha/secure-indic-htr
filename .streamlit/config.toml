# SecureDocAI Streamlit config
# showSidebarNavigation=false belt-and-braces: app_pages/ (renamed from the
# default "pages/") already stops Streamlit's automatic native multipage
# nav from appearing, but this setting guarantees it stays off even if the
# folder is ever renamed back.

[client]
showSidebarNavigation = false

[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F172A"
font = "sans serif"
